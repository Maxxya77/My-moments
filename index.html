<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>순간 기록장</title>
<style>
  :root {
    --bg: #F6F4EE;
    --paper: #FFFFFF;
    --ink: #2B2B26;
    --ink-soft: #6B6A5F;
    --forest: #2F4A3C;
    --forest-light: #4C6E5B;
    --gold: #B8912E;
    --line: #E4E0D3;
    --danger: #A6483A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    padding: 28px 16px 60px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  header { margin-bottom: 24px; border-bottom: 1px solid var(--line); padding-bottom: 16px; }
  header .eyebrow { font-size: 12px; letter-spacing: 0.12em; color: var(--forest-light); text-transform: uppercase; font-weight: 600; }
  header h1 { font-family: Georgia, "Noto Serif KR", serif; font-size: 26px; margin: 6px 0 4px; color: var(--forest); }
  header p { margin: 0; font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; }
  .card { background: var(--paper); border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-bottom: 20px; }
  .card h2 { font-size: 14px; margin: 0 0 14px; color: var(--forest); display: flex; align-items: center; gap: 8px; }
  .card h2 .num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: var(--forest); color: white; font-size: 11px; font-weight: 700; }
  label { display: block; font-size: 12.5px; color: var(--ink-soft); margin: 12px 0 6px; }
  label:first-of-type { margin-top: 0; }
  input[type="text"], textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px;
    font-size: 14.5px; font-family: inherit; color: var(--ink); background: #FCFBF8; resize: none;
  }
  textarea { min-height: 56px; line-height: 1.5; }
  input:focus, textarea:focus { outline: none; border-color: var(--forest-light); box-shadow: 0 0 0 3px rgba(47,74,60,0.08); }
  .value-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .value-tags button {
    border: 1px solid var(--line); background: #FCFBF8; border-radius: 999px; padding: 6px 12px;
    font-size: 12.5px; color: var(--ink-soft); cursor: pointer; transition: all 0.15s ease;
  }
  .value-tags button.active { background: var(--gold); border-color: var(--gold); color: white; }
  .save-btn {
    width: 100%; margin-top: 16px; background: var(--forest); color: white; border: none; border-radius: 8px;
    padding: 12px; font-size: 14.5px; font-weight: 600; cursor: pointer; transition: background 0.15s ease;
  }
  .save-btn:hover { background: var(--forest-light); }
  .save-btn:disabled { background: #B9B9AE; cursor: default; }
  .status { font-size: 12.5px; margin-top: 8px; color: var(--forest-light); min-height: 16px; }
  .status.error { color: var(--danger); }
  .log-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .log-header h2 { font-family: Georgia, "Noto Serif KR", serif; font-size: 17px; color: var(--forest); margin: 0; }
  .log-count { font-size: 12px; color: var(--ink-soft); }
  .entry { position: relative; padding: 12px 0 12px 20px; border-left: 2px solid var(--line); margin-left: 4px; }
  .entry::before { content: ""; position: absolute; left: -5px; top: 18px; width: 8px; height: 8px; border-radius: 50%; background: var(--gold); }
  .entry .date { font-size: 11.5px; color: var(--ink-soft); margin-bottom: 4px; }
  .entry .moment { font-size: 14.5px; line-height: 1.5; margin-bottom: 6px; }
  .entry .meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .pill { font-size: 11.5px; padding: 3px 9px; border-radius: 999px; background: rgba(47,74,60,0.08); color: var(--forest); }
  .pill.gold { background: rgba(184,145,46,0.12); color: var(--gold); }
  .delete-btn { margin-left: auto; background: none; border: none; color: var(--ink-soft); font-size: 11.5px; cursor: pointer; text-decoration: underline; padding: 0; }
  .empty { text-align: center; padding: 30px 10px; color: var(--ink-soft); font-size: 13.5px; line-height: 1.6; }
  .loading { text-align: center; padding: 20px; color: var(--ink-soft); font-size: 13px; }
  .banner {
    background: #FBF3E3; border: 1px solid #E9D8AE; color: #7A5B12; font-size: 12.5px;
    padding: 10px 14px; border-radius: 8px; margin-bottom: 18px; line-height: 1.5; display: none;
  }
  .banner.show { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Signature Moments Journal</div>
    <h1>순간 기록장</h1>
    <p>오늘 기분 좋았던 작은 순간을 하루 한 줄씩 남겨보세요. 폰이든 노트북이든 어디서 적어도 동기화됩니다.</p>
  </header>

  <div class="banner" id="configBanner">
    ⚠ Firebase 설정이 비어있습니다. 아래 코드의 <code>firebaseConfig</code> 부분을 본인 프로젝트(JEJU-TRIP-2608)의 설정값으로 채워주세요.
  </div>

  <div class="card">
    <h2><span class="num">1</span>오늘의 순간</h2>
    <label for="moment">오늘 하루 중 작게 기분 좋았던 순간은?</label>
    <textarea id="moment" placeholder="예: 친구에게 복잡한 일정을 쉽게 정리해서 설명해줬다"></textarea>
    <label for="emotion">그때 느낀 감정을 한 단어로 짚어보면?</label>
    <input type="text" id="emotion" placeholder="예: 뿌듯함, 속 시원함, 보람">
    <label>그 감정을 만든 핵심 가치는? (해당하는 것 선택, 복수 가능)</label>
    <div class="value-tags" id="valueTags">
      <button data-v="명료화">명료화</button>
      <button data-v="기여">기여</button>
      <button data-v="성취">성취</button>
      <button data-v="연결">연결</button>
      <button data-v="창조">창조</button>
      <button data-v="분석">분석</button>
      <button data-v="자율">자율</button>
      <button data-v="배움">배움</button>
    </div>
    <label for="customValue">직접 입력 (선택)</label>
    <input type="text" id="customValue" placeholder="목록에 없다면 직접 적어보세요">
    <button class="save-btn" id="saveBtn">오늘 기록 저장하기</button>
    <div class="status" id="status"></div>
  </div>

  <div class="card">
    <div class="log-header">
      <h2>지금까지의 기록</h2>
      <span class="log-count" id="logCount"></span>
    </div>
    <div id="log"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<!-- Firebase SDK (compat, 제주 앱과 같은 버전으로 맞추면 더 좋습니다) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// =====================================================================
// 여기에 본인의 Firebase 프로젝트 설정값을 넣어주세요.
// Firebase 콘솔 > 프로젝트 설정 > 일반 > 내 앱(SDK 설정 및 구성)에서 복사
// JEJU-TRIP-2608에서 쓰던 것과 "같은" 값을 그대로 넣으면 같은 프로젝트를 재사용합니다.
// =====================================================================
const firebaseConfig = {
  apiKey: "AIzaSyBEUkwBCFv0ICfJ92AG_zK6Xkazx4ejchE",
  authDomain: "planning-with-ai-48e01.firebaseapp.com",
  projectId: "planning-with-ai-48e01",
  storageBucket: "planning-with-ai-48e01.firebasestorage.app",
  messagingSenderId: "291204006646",
  appId: "1:291204006646:web:8418755adf9f1d747ba2d7"
};

const isConfigured = !firebaseConfig.apiKey.startsWith("여기에");
if (!isConfigured) {
  document.getElementById('configBanner').classList.add('show');
}

let db = null;
if (isConfigured) {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}

const COLLECTION = 'journalEntries'; // 제주 앱과 겹치지 않는 새 컬렉션

const selectedValues = new Set();
const valueTagsEl = document.getElementById('valueTags');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');
const logCountEl = document.getElementById('logCount');
const saveBtn = document.getElementById('saveBtn');

valueTagsEl.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.v;
    if (selectedValues.has(v)) { selectedValues.delete(v); btn.classList.remove('active'); }
    else { selectedValues.add(v); btn.classList.add('active'); }
  });
});

function todayLabel() {
  const d = new Date();
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function loadEntries() {
  if (!db) {
    logEl.innerHTML = '<div class="empty">Firebase 설정을 먼저 채워주세요.</div>';
    return;
  }
  try {
    const snap = await db.collection(COLLECTION).orderBy('ts', 'desc').get();
    const entries = [];
    snap.forEach(doc => entries.push({ id: doc.id, ...doc.data() }));
    renderEntries(entries);
  } catch (e) {
    logEl.innerHTML = '<div class="empty">기록을 불러오지 못했습니다. Firebase 설정과 Firestore 보안 규칙을 확인해주세요.</div>';
    console.error(e);
  }
}

function renderEntries(entries) {
  logCountEl.textContent = entries.length > 0 ? `${entries.length}개` : '';
  if (entries.length === 0) {
    logEl.innerHTML = '<div class="empty">아직 기록이 없습니다.<br>위에 오늘의 순간을 적고 저장해보세요.</div>';
    return;
  }
  logEl.innerHTML = '';
  entries.forEach(entry => {
    const div = document.createElement('div');
    div.className = 'entry';
    const values = (entry.values || []).map(v => `<span class="pill gold">${escapeHtml(v)}</span>`).join('');
    const emotion = entry.emotion ? `<span class="pill">${escapeHtml(entry.emotion)}</span>` : '';
    div.innerHTML = `
      <div class="date">${escapeHtml(entry.date)}</div>
      <div class="moment">${escapeHtml(entry.moment)}</div>
      <div class="meta">${emotion}${values}<button class="delete-btn" data-id="${entry.id}">삭제</button></div>
    `;
    logEl.appendChild(div);
  });
  logEl.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      try {
        await db.collection(COLLECTION).doc(btn.dataset.id).delete();
        loadEntries();
      } catch (e) {
        statusEl.textContent = '삭제 중 오류가 발생했습니다.';
        statusEl.classList.add('error');
      }
    });
  });
}

saveBtn.addEventListener('click', async () => {
  if (!db) {
    statusEl.textContent = 'Firebase 설정을 먼저 채워주세요.';
    statusEl.classList.add('error');
    return;
  }
  const moment = document.getElementById('moment').value.trim();
  const emotion = document.getElementById('emotion').value.trim();
  const customValue = document.getElementById('customValue').value.trim();

  if (!moment) {
    statusEl.textContent = '오늘의 순간을 먼저 적어주세요.';
    statusEl.classList.add('error');
    return;
  }

  const values = Array.from(selectedValues);
  if (customValue) values.push(customValue);

  saveBtn.disabled = true;
  statusEl.classList.remove('error');
  statusEl.textContent = '저장 중...';

  try {
    await db.collection(COLLECTION).add({
      ts: Date.now(),
      date: todayLabel(),
      moment,
      emotion,
      values
    });
    statusEl.textContent = '저장되었습니다.';
    document.getElementById('moment').value = '';
    document.getElementById('emotion').value = '';
    document.getElementById('customValue').value = '';
    selectedValues.clear();
    valueTagsEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    loadEntries();
  } catch (e) {
    statusEl.textContent = '저장에 실패했습니다. Firestore 보안 규칙을 확인해주세요.';
    statusEl.classList.add('error');
    console.error(e);
  } finally {
    saveBtn.disabled = false;
  }
});

loadEntries();
</script>
</body>
</html>
